<!DOCTYPE html>
<html>
<head>
    <title>Moje První Webová Hra</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        canvas { border: 2px solid #fff; background: #000; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 50, y: 50, size: 30, color: "lime" };

    function draw() {
        // Vymazání plátna
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Vykreslení hráče
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        requestAnimationFrame(draw);
    }

    // Ovládání šipkami
    window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") player.y -= 10;
        if (e.key === "ArrowDown") player.y += 10;
        if (e.key === "ArrowLeft") player.x -= 10;
        if (e.key === "ArrowRight") player.x += 10;
    });

    draw();
</script>
</body>
</html>
